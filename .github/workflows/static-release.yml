name: Static Release

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: static-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Build and release static site
    runs-on: ubuntu-latest

    env:
      CI: true
      NODE_OPTIONS: --openssl-legacy-provider
      PUBLIC_URL: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test -- --watchAll=false

      - name: Build static site
        run: npm run build

      - name: Package static build
        run: |
          cd build
          zip -r ../ubb-graduation-timer-static.zip .
          cd ..
          sha256sum ubb-graduation-timer-static.zip > ubb-graduation-timer-static.zip.sha256

      - name: Publish rolling release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: latest
        run: |
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git tag -f "$RELEASE_TAG" "$GITHUB_SHA"
          git push -f origin "$RELEASE_TAG"

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" \
              ubb-graduation-timer-static.zip \
              ubb-graduation-timer-static.zip.sha256 \
              --clobber
          else
            gh release create "$RELEASE_TAG" \
              ubb-graduation-timer-static.zip \
              ubb-graduation-timer-static.zip.sha256 \
              --title "Latest graduation timer static build" \
              --notes "Automatically built from commit $GITHUB_SHA." \
              --target "$GITHUB_SHA" \
              --latest
          fi
